<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Produk Real-time</title>
    <script <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.3.0/socket.io.js"></script>

    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        h1 { color: #2c3e50; }
        button { padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #2980b9; }
        ul { list-style: none; padding: 0; }
        li { background: #ecf0f1; margin: 5px 0; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>📦 Produk Real-time dari FakeStore API</h1>
    <p>Klik tombol di bawah untuk mengambil data produk via WebSocket:</p>
    <button onclick="getProducts()">Ambil Data Produk</button>
    <ul id="product-list"></ul>

    <script>
        // Hubungkan ke server WebSocket
        const socket = io();

        // Fungsi untuk minta data produk
        function getProducts() {
            socket.emit("get_products");
        }

        // Event listener: menerima data produk dari server
        socket.on("update_products", function(data) {
            const list = document.getElementById("product-list");
            list.innerHTML = "";
            data.forEach(item => {
                const li = document.createElement("li");
                li.textContent = `${item.id}. ${item.Produk} - Rp${item.Harga} (${item.Kategori})`;
                list.appendChild(li);
            });
        });
    </script>
</body>
</html>
